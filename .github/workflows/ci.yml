name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Keep in step with the Dockerfile pin and engines.node (CL-22).
          node-version: "24"
          cache: npm

      - run: npm ci

      # A green `npm ci` is NOT proof the sandbox works: it resolves the native
      # addon from a prebuilt binary in seconds, and npm 11.16 merely *warns*
      # about unapproved install scripts (it will block them in a future
      # release). Execute real code in a real isolate so the executor's one
      # load-bearing dependency is proven rather than assumed (ADR 0001 / CL-21).
      - name: Prove the isolated-vm sandbox executes code
        run: node scripts/verify-sandbox.cjs

      - run: npm run typecheck

      - run: npm run coverage

      - run: npm run build

  docker-build:
    name: docker image (validates CL-21 packaging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Builds the same Dockerfile the action ships as, compiling isolated-vm
      # inside the container. Proves the packaging decision (ADR 0001) end-to-end.
      - name: Build action image
        run: docker build -t codelens:ci .
