name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Keep in step with the Dockerfile pin and engines.node (CL-22).
          node-version: "24"
          cache: npm

      # npm ci also compiles/fetches the native isolated-vm binary on Linux —
      # so a green install here is the first proof the native dep builds (CL-19).
      - run: npm ci

      - run: npm run typecheck

      - run: npm run coverage

      - run: npm run build

  docker-build:
    name: docker image (validates CL-21 packaging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Builds the same Dockerfile the action ships as, compiling isolated-vm
      # inside the container. Proves the packaging decision (ADR 0001) end-to-end.
      - name: Build action image
        run: docker build -t codelens:ci .
