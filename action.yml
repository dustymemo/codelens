name: "CodeLens"
description: "Independently executes changed code on a PR and posts a plain-English execution trace, so reviewers comprehend AI-written code instead of rubber-stamping it."
author: "CodeLens"

branding:
  icon: "search"
  color: "purple"

inputs:
  github-token:
    description: "Token used to post the report comment on the PR. Defaults to the workflow token."
    required: false
    default: ${{ github.token }}

  llm-backend:
    description: "Which model backend to use: 'sdk' (Anthropic API key) or 'cli' (Claude CLI via OAuth token)."
    required: false
    default: "sdk"

  anthropic-api-key:
    description: "Anthropic API key. Required when llm-backend is 'sdk'. Billed per token."
    required: false

  claude-code-oauth-token:
    description: "Claude CLI OAuth token (from `claude setup-token`). Required when llm-backend is 'cli'. Uses your subscription."
    required: false

  model:
    description: "Model id used for the two Claude calls."
    required: false
    default: "claude-sonnet-4-6"

# Packaging: Docker action — see docs/adr/0001-action-packaging.md (CL-21).
# isolated-vm is a native addon, so the action ships as a container that pins the
# compiled binary and wraps the untrusted-code executor in a second (OS-level) wall.
# Dev: build the Dockerfile on the runner. Release: switch to a GHCR-published image
#   image: "docker://ghcr.io/<org>/codelens:v1"
runs:
  using: "docker"
  image: "Dockerfile"
